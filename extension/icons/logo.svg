<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- background gradient circle -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0e1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff8c5a"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- envelope -->
  <g transform="translate(96, 156)" filter="url(#softShadow)">
    <rect x="0" y="0" width="260" height="180" rx="18" fill="#f0f6fc" stroke="#30363d" stroke-width="3"/>
    <path d="M 0 0 L 130 100 L 260 0" fill="none" stroke="#30363d" stroke-width="3"/>
  </g>

  <!-- magnifying glass -->
  <g transform="translate(248, 256)" filter="url(#softShadow)">
    <!-- glass circle -->
    <circle cx="0" cy="0" r="86" fill="rgba(255,107,53,0.12)" stroke="url(#accent)" stroke-width="16"/>
    <!-- inner highlight to suggest glass -->
    <circle cx="-22" cy="-22" r="20" fill="rgba(255,255,255,0.18)"/>
    <!-- handle -->
    <line x1="62" y1="62" x2="140" y2="140" stroke="url(#accent)" stroke-width="22" stroke-linecap="round"/>
  </g>

  <!-- small "scan beam" inside the glass to suggest analysis -->
  <g transform="translate(248, 256)" opacity="0.9">
    <line x1="-50" y1="-20" x2="50" y2="-20" stroke="#ff6b35" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="-50" y1="0"   x2="40" y2="0"   stroke="#ff6b35" stroke-width="6" stroke-linecap="round" opacity="0.55"/>
    <line x1="-50" y1="20"  x2="30" y2="20"  stroke="#ff6b35" stroke-width="6" stroke-linecap="round" opacity="0.30"/>
  </g>
</svg>
